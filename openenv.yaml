spec_version: 1
name: traffic-env
version: "1.0.0"
description: >
  Smart City Traffic Flow -- OpenEnv RL environment for adaptive traffic
  signal control. An agent controls signal phases at urban intersections
  to minimise vehicle waiting time and maximise throughput. Simulates
  real-world sensor data (queue lengths, wait times) from road cameras
  and inductive loop detectors.

type: environment
runtime: docker

app:
  port: 7860
  module: server.app
  object: app

tasks:
  - id: easy
    description: "Single intersection, 4 lanes, steady vehicle arrival rate"
    difficulty: easy
    max_steps: 100
    reward_range: [-1.0, 1.0]
    scoring: "0.0-1.0 normalised against random and heuristic baselines"
    env_vars:
      TASK_LEVEL: easy

  - id: medium
    description: "3-intersection urban corridor with rush-hour demand spike at step 50"
    difficulty: medium
    max_steps: 200
    reward_range: [-1.0, 1.0]
    scoring: "0.0-1.0 normalised against random and heuristic baselines"
    env_vars:
      TASK_LEVEL: medium

  - id: hard
    description: "3x3 grid of 9 intersections with random incidents and demand spikes"
    difficulty: hard
    max_steps: 300
    reward_range: [-1.0, 1.0]
    scoring: "0.0-1.0 normalised against random and heuristic baselines"
    env_vars:
      TASK_LEVEL: hard

action_space:
  type: discrete_composite
  fields:
    - name: action_type
      type: enum
      values: [extend_green, next_phase]
      description: "extend_green = hold green +5s; next_phase = switch phase now"
    - name: intersection_id
      type: int
      min: 0
      description: "0-indexed intersection to control (0 for easy, 0-2 medium, 0-8 hard)"

observation_space:
  type: structured
  fields:
    - name: intersections
      type: list
      description: "Per-intersection state with per-lane queue lengths and wait times"
    - name: total_waiting_vehicles
      type: int
      description: "Total cars waiting across all intersections"
    - name: total_avg_wait
      type: float
      unit: seconds
      description: "Fleet-wide average wait time"
    - name: throughput_last_step
      type: int
      description: "Vehicles that cleared stop-lines this step"
    - name: reward
      type: float
      description: "Step reward"
    - name: done
      type: bool
      description: "True when episode max_steps reached"

reward:
  type: dense
  range: [-1.0, 1.0]
  description: >
    Dense reward fired at every step.
    reward = 0.6 * throughput_bonus + 0.4 * wait_penalty
    throughput_bonus in [0,1]: fraction of max possible vehicles cleared.
    wait_penalty in [-1,0]: fraction of max possible waiting vehicle-seconds.

endpoints:
  - path: /health
    method: GET
    description: "Health check"
  - path: /reset
    method: POST
    description: "Start a new episode, returns initial observation"
  - path: /step
    method: POST
    description: "Apply action, returns next observation and reward"
  - path: /state
    method: GET
    description: "Get current episode metadata"
  - path: /tasks
    method: GET
    description: "List all 3 tasks with descriptions and scoring info"
  - path: /grader
    method: POST
    description: "Grade a task by ID, returns normalised score 0.0-1.0"
  - path: /baseline
    method: GET
    description: "Run heuristic oracle on all 3 tasks, returns reproducible scores"

metadata:
  author: "Anika Jain"
  license: MIT
  tags: [traffic, urban-planning, real-world, rl, openenv, smart-city]
  huggingface_space: "anidoesdev/traffic-env"
